version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend # For hot reloading during dev if we override command
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80
      # Add other env vars here or use env_file
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"  # Unique port to avoid conflicts with other projects

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: arq backend.worker.WorkerSettings
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    environment:
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      - redis
      - backend
